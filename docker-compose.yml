name: flotory

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    working_dir: /var/www/html
    restart: unless-stopped
    volumes:
      - .:/var/www/html
    ports:
      - "8000:8000"
    environment:
      APP_URL: ${APP_URL:-http://localhost:8000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8000}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: flotory_app
      DB_USERNAME: flotory
      DB_PASSWORD: secret
      BROADCAST_CONNECTION: reverb
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      REVERB_APP_ID: flotory-local-app
      REVERB_APP_KEY: flotory-local-key
      REVERB_APP_SECRET: flotory-local-secret
      # Docker DNS can be unreliable on some setups; route via host port mapping.
      REVERB_HOST: host.docker.internal
      REVERB_BROADCAST_HOST: host.docker.internal
      REVERB_PORT: 8080
      REVERB_SCHEME: http
      REVERB_SERVER_HOST: 0.0.0.0
      REVERB_SERVER_PORT: 8080
    depends_on:
      mysql:
        condition: service_healthy
    command: ["sh", "/var/www/html/docker/entrypoint-app.sh"]

  reverb:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    working_dir: /var/www/html
    restart: unless-stopped
    volumes:
      - .:/var/www/html
    ports:
      - "8080:8080"
    environment:
      APP_URL: ${APP_URL:-http://localhost:8000}
      BROADCAST_CONNECTION: reverb
      REVERB_APP_ID: flotory-local-app
      REVERB_APP_KEY: flotory-local-key
      REVERB_APP_SECRET: flotory-local-secret
      REVERB_HOST: reverb
      REVERB_PORT: 8080
      REVERB_SCHEME: http
      REVERB_SERVER_HOST: 0.0.0.0
      REVERB_SERVER_PORT: 8080
    depends_on:
      mysql:
        condition: service_healthy
    command: ["sh", "/var/www/html/docker/entrypoint-reverb.sh"]

  vite:
    image: node:24-alpine
    working_dir: /var/www/html
    restart: unless-stopped
    volumes:
      - .:/var/www/html
      - node_modules:/var/www/html/node_modules
    ports:
      - "5173:5173"
    environment:
      APP_URL: ${APP_URL:-http://localhost:8000}
      VITE_REVERB_APP_KEY: flotory-local-key
      VITE_REVERB_HOST: ${VITE_REVERB_HOST:-localhost}
      VITE_REVERB_PORT: 8080
      VITE_REVERB_SCHEME: http
      VITE_HMR_HOST: ${VITE_HMR_HOST:-localhost}
      VITE_DEV_SERVER_URL: ${VITE_DEV_SERVER_URL:-http://localhost:5173}
    command: sh -c "npm install && npm run dev"

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: flotory_app
      MYSQL_USER: flotory
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: secret
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-psecret"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  mysql_data:
  node_modules:

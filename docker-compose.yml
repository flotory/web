services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    ports:
      - "8000:8000"
    environment:
      APP_URL: ${APP_URL:-http://localhost:8000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: flotory_app
      DB_USERNAME: flotory
      DB_PASSWORD: secret
      BROADCAST_CONNECTION: reverb
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      REVERB_APP_ID: flotory-local-app
      REVERB_APP_KEY: flotory-local-key
      REVERB_APP_SECRET: flotory-local-secret
      # Docker DNS can be unreliable on some setups; route via host port mapping.
      REVERB_HOST: host.docker.internal
      REVERB_BROADCAST_HOST: host.docker.internal
      REVERB_PORT: 8080
      REVERB_SCHEME: http
      REVERB_SERVER_HOST: 0.0.0.0
      REVERB_SERVER_PORT: 8080
    depends_on:
      mysql:
        condition: service_healthy
    command: >
      sh -c "
        [ -f .env ] || cp .env.example .env;
        mkdir -p public/uploads/venue-logos public/uploads/venue-covers public/uploads/reward-milestones;
        chmod -R 775 public/uploads 2>/dev/null || true;
        composer install;
        php artisan key:generate --force;
        php artisan migrate --seed --force;
        php artisan serve --host=0.0.0.0 --port=8000
      "

  reverb:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    ports:
      - "8080:8080"
    environment:
      APP_URL: ${APP_URL:-http://localhost:8000}
      BROADCAST_CONNECTION: reverb
      REVERB_APP_ID: flotory-local-app
      REVERB_APP_KEY: flotory-local-key
      REVERB_APP_SECRET: flotory-local-secret
      REVERB_HOST: reverb
      REVERB_PORT: 8080
      REVERB_SCHEME: http
      REVERB_SERVER_HOST: 0.0.0.0
      REVERB_SERVER_PORT: 8080
    depends_on:
      app:
        condition: service_started
    command: >
      sh -c "
        composer install;
        php artisan reverb:start --host=0.0.0.0 --port=8080
      "

  vite:
    image: node:24-alpine
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - node_modules:/var/www/html/node_modules
    ports:
      - "5173:5173"
    environment:
      APP_URL: ${APP_URL:-http://localhost:8000}
      VITE_REVERB_APP_KEY: flotory-local-key
      VITE_REVERB_HOST: ${VITE_REVERB_HOST:-localhost}
      VITE_REVERB_PORT: 8080
      VITE_REVERB_SCHEME: http
      VITE_HMR_HOST: ${VITE_HMR_HOST:-localhost}
      VITE_DEV_SERVER_URL: ${VITE_DEV_SERVER_URL:-http://localhost:5173}
    command: sh -c "npm install && npm run dev"

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: flotory_app
      MYSQL_USER: flotory
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: secret
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-psecret"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  mysql_data:
  node_modules:

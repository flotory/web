name: flotory

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    working_dir: /var/www/html
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - .:/var/www/html
    ports:
      - "8000:8000"
    environment:
      APP_ENV: local
      APP_URL: ${APP_URL:-http://localhost:8000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8000}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: flotory_app
      DB_USERNAME: flotory
      DB_PASSWORD: secret
      BROADCAST_CONNECTION: null
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
    depends_on:
      mysql:
        condition: service_healthy
    command: ["sh", "/var/www/html/docker/entrypoint-app.sh"]

  vite:
    image: node:24-alpine
    working_dir: /var/www/html
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - .:/var/www/html
      - node_modules:/var/www/html/node_modules
    ports:
      - "${VITE_HOST_PORT:-5173}:5173"
    environment:
      APP_URL: ${APP_URL:-http://localhost:8000}
      VITE_REVERB_APP_KEY: flotory-local-key
      VITE_REVERB_HOST: ${VITE_REVERB_HOST:-localhost}
      VITE_REVERB_PORT: 8080
      VITE_REVERB_SCHEME: http
      VITE_HMR_HOST: ${VITE_HMR_HOST:-localhost}
      VITE_DEV_SERVER_URL: ${VITE_DEV_SERVER_URL:-http://localhost:${VITE_HOST_PORT:-5173}}
      VITE_GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
    command: sh -c "npm install && npm run dev"

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: flotory_app
      MYSQL_USER: flotory
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: secret
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-psecret"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  mysql_data:
  node_modules:

# Nginx reverse proxy for Flotory (HTTP → HTTPS, Let's Encrypt)
# Install: deploy/setup-server.sh — certs: certbot certonly --nginx -d flotory.com -d www.flotory.com

server {
    listen 80;
    listen [::]:80;
    server_name flotory.com www.flotory.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://flotory.com$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.flotory.com;

    ssl_certificate /etc/letsencrypt/live/flotory.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/flotory.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://flotory.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name flotory.com;

    ssl_certificate /etc/letsencrypt/live/flotory.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/flotory.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20M;

    # Media is on S3 in production; /uploads/ is handled by Laravel (redirect to S3 when configured).

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

}

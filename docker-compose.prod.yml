# Production stack for VPS (DigitalOcean, etc.)
# Usage: docker compose -f docker-compose.prod.yml up -d --build

name: flotory

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    environment:
      DB_HOST: mysql
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    command: >
      sh -c "
        composer install --no-dev --optimize-autoloader --no-interaction;
        php artisan config:cache;
        php artisan route:cache;
        php artisan view:cache;
        php artisan migrate --force;
        php artisan serve --host=0.0.0.0 --port=8000
      "
    extra_hosts:
      - "host.docker.internal:host-gateway"

  reverb:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    ports:
      - "127.0.0.1:8080:8080"
    env_file:
      - .env
    depends_on:
      - app
    restart: unless-stopped
    command: >
      sh -c "
        composer install --no-dev --optimize-autoloader --no-interaction;
        php artisan reverb:start --host=0.0.0.0 --port=8080
      "

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    env_file:
      - .env
    environment:
      DB_HOST: mysql
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    command: >
      sh -c "
        composer install --no-dev --optimize-autoloader --no-interaction;
        php artisan queue:work --sleep=3 --tries=3 --max-time=3600
      "

  mysql:
    image: mysql:8.4
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-flotory_app}
      MYSQL_USER: ${DB_USERNAME:-flotory}
      MYSQL_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?Set DB_ROOT_PASSWORD in .env}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

volumes:
  # Keep existing data from when the project name was "web" (/var/www/web).
  mysql_data:
    name: web_mysql_data

appId: "${APP_ID}"
---
# Forgot password from login — prefilled email, success message, back to login.
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible: "Flotory Mobile"
    timeout: 30000
- tapOn:
    id: "login-email-input"
- inputText: "${CUSTOMER_EMAIL}"
- tapOn:
    id: "login-forgot-password-link"
- extendedWaitUntil:
    visible: "Forgot password?"
    timeout: 20000
- assertVisible:
    id: "forgot-password-email-input"
- tapOn:
    id: "forgot-password-email-input"
- eraseText
- inputText: "${CUSTOMER_EMAIL}"
- hideKeyboard
- tapOn: "Send reset link"
- extendedWaitUntil:
    visible: "If that email is registered"
    timeout: 20000
- tapOn: "Back to login"
- extendedWaitUntil:
    visible: "Flotory Mobile"
    timeout: 20000
